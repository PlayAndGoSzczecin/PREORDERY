<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLAY&GO PREORDER</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00aaff; --bg: #0d1117; --card: #161b22; --text: #e0e0e0; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); color: var(--text); min-height: 100vh; background-size: cover; background-attachment: fixed; background-position: center; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: -1; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        nav { text-align: center; padding: 20px 0; font-size: 2rem; font-weight: 800; color: #fff; text-shadow: 0 0 10px var(--primary); }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .game-card { background: var(--card); border-radius: 18px; overflow: hidden; position: relative; height: 480px; border: 1px solid #333; }
        .card-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); position: absolute; }
        .card-body { position: relative; z-index: 1; padding: 25px; height: 100%; display: flex; flex-direction: column; box-sizing: border-box; background: linear-gradient(to top, rgba(0,0,0,0.9) 30%, transparent 100%); }
        .platform { background: var(--primary); color: #fff; padding: 4px 12px; border-radius: 5px; font-size: 0.7rem; font-weight: 800; align-self: flex-start; }
        .title { font-size: 1.6rem; font-weight: 800; color: #fff; margin: 10px 0; }
        .price { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-top: auto; }
        .btn { background: #ff4444; color: #fff; border: none; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; width: 100%; }
        
        /* Modal */
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: var(--card); margin: 10% auto; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid var(--primary); position: relative; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="container">
        <nav>PLAY&GO</nav>
        <div id="loader" style="text-align:center; padding: 50px;">Ładowanie ofert...</div>
        <div id="games-grid" class="games-grid"></div>
    </div>

    <div id="resModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; right:20px; top:15px; color:#fff; font-size:30px; cursor:pointer;" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color:#fff;">Rezerwacja</h2>
            <form id="resForm">
                <input type="hidden" id="gameTitle">
                <input type="text" id="custName" placeholder="Imię i Nazwisko" required>
                <input type="tel" id="custPhone" placeholder="Telefon" required>
                <input type="email" id="custEmail" placeholder="E-mail" required>
                <button type="submit" id="submitBtn" class="btn">POTWIERDZAM</button>
            </form>
        </div>
    </div>

    <script>
        const URL = 'https://script.google.com/macros/s/AKfycby4f8nc66EpMg3ZN9R9ZuFB7vdlV61m64AbmD_IbTQ0Y-xMAZ-pQM5kOpvFdHz07ztDfg/exec';

        async function loadData() {
            try {
                console.log("Pobieram dane...");
                const res = await fetch(URL);
                const data = await res.json();
                console.log("Dane pobrane:", data);

                if (data.settings && data.settings.TloStronyURL) {
                    document.body.style.backgroundImage = "url('" + data.settings.TloStronyURL + "')";
                }

                const grid = document.getElementById('games-grid');
                grid.innerHTML = '';
                document.getElementById('loader').style.display = 'none';

                data.games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    
                    // Bezpieczne sprawdzanie dostępności
                    let dostepne = (game.Dostepne !== undefined) ? game.Dostepne : 99;
                    let btnAttr = dostepne <= 0 ? 'disabled style="background:#555"' : '';
                    let btnText = dostepne <= 0 ? 'WYPRZEDANE' : 'BIORE';

                    card.innerHTML = `
                        <img src="${game.OkladkaURL}" class="card-img" onerror="this.src='https://via.placeholder.com/300x450?text=Brak+Okładki'">
                        <div class="card-body">
                            <span class="platform">${game.Platforma || 'GRA'}</span>
                            <div class="title">${game.Tytul}</div>
                            <div class="price">${game.Cena} zł</div>
                            <button class="btn" ${btnAttr} onclick="openModal('${game.Tytul} (${game.Platforma})')">${btnText}</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error("Błąd ładowania:", e);
                document.getElementById('loader').innerText = "Wystąpił błąd. Sprawdź konsolę (F12).";
            }
        }

        function openModal(t) {
            document.getElementById('modalTitle').innerText = t;
            document.getElementById('gameTitle').value = t;
            document.getElementById('resModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('resModal').style.display = 'none';
        }

        document.getElementById('resForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "WYSYŁANIE...";
            btn.disabled = true;

            const p = new URLSearchParams({
                tytul: document.getElementById('gameTitle').value,
                imie: document.getElementById('custName').value,
                telefon: document.getElementById('custPhone').value,
                email: document.getElementById('custEmail').value
            });

            try {
                await fetch(URL + '?' + p.toString(), { mode: 'no-cors' });
                alert('Zapisano pomyślnie!');
                closeModal();
                document.getElementById('resForm').reset();
            } catch (err) {
                alert('Błąd wysyłki.');
            } finally {
                btn.innerText = "POTWIERDZAM";
                btn.disabled = false;
            }
        };

        loadData();
    </script>
</body>
</html>
