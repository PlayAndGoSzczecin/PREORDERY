<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLAY&GO PREORDERY</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00aaff; --bg: #0d1117; --card: #161b22; --text: #e0e0e0; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            background-size: cover; 
            background-attachment: fixed; 
            background-position: center; 
        }

        body::before { 
            content: ""; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.6); 
            z-index: -1; 
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        
        nav { 
            text-align: center; 
            padding: 20px 0; 
            font-size: 2.5rem; 
            font-weight: 800; 
            color: #fff; 
            text-shadow: 0 0 15px var(--primary); 
            letter-spacing: 3px;
        }

        .header-section { 
            text-align: center; 
            background: rgba(0,0,0,0.7); 
            padding: 30px 15px; 
            border-radius: 20px; 
            margin: 20px auto 40px; 
            max-width: 800px; 
            border: 1px solid #333; 
            backdrop-filter: blur(10px); 
        }
        .header-section h1 { margin: 0; font-size: 2rem; color: #fff; }

        #loader { text-align: center; padding: 50px; font-size: 1.2rem; color: var(--primary); }

        .games-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
        }

        .game-card { 
            background: var(--card); 
            border-radius: 20px; 
            overflow: hidden; 
            position: relative; 
            height: 500px; 
            border: 1px solid #333; 
            transition: 0.3s;
        }

        .game-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .card-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            filter: brightness(1.2);
            position: absolute; 
        }

        .card-body { 
            position: relative; 
            z-index: 1; 
            padding: 25px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box; 
            background: linear-gradient(to top, rgba(0,0,0,0.9) 35%, transparent 100%); 
        }

        .platform { 
            background: var(--primary); 
            color: #fff; 
            padding: 5px 12px; 
            border-radius: 6px; 
            font-size: 0.75rem; 
            font-weight: 800; 
            align-self: flex-start; 
            margin-bottom: 10px;
        }

        .title { 
    font-size: 1.7rem; 
    font-weight: 800; 
    color: #fff; 
    line-height: 1.2; 
    margin-bottom: 5px;
    /* DODAJ TĘ LINIĘ PONIŻEJ: */
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8), -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
}
        .date-info { font-size: 0.85rem; opacity: 0.8; }
        .countdown { font-size: 0.9rem; font-weight: 700; margin-bottom: 15px; }

        .price { font-size: 2.2rem; font-weight: 800; color: var(--primary); margin-top: auto; margin-bottom: 15px; }

        .btn { 
            background: #ff4444; 
            color: #fff; 
            border: none; 
            padding: 16px; 
            border-radius: 14px; 
            font-weight: 800; 
            cursor: pointer; 
            text-transform: uppercase; 
            width: 100%;
        }

        .btn:disabled { background: #555 !important; cursor: not-allowed; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { 
            background: var(--card); 
            margin: 15vh auto; 
            padding: 35px; 
            border-radius: 25px; 
            width: 90%; 
            max-width: 420px; 
            border: 1px solid var(--primary); 
            position: relative; 
            box-sizing: border-box;
        }

        input { 
            width: 100%; 
            padding: 15px; 
            margin: 12px 0; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: #1a1f26; 
            color: #fff; 
            box-sizing: border-box; 
        }

        #successMessage { display: none; background: #28a745; color: white; padding: 20px; border-radius: 15px; text-align: center; font-weight: bold; }
        .close-btn { position: absolute; right: 25px; top: 20px; color: #fff; font-size: 35px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <nav>PLAY&GO</nav>
        
        <div class="header-section">
            <h1>Nadchodzące premiery.</h1>
        </div>

        <div id="loader">Wczytywanie ofert...</div>
        <div id="games-grid" class="games-grid"></div>
    </div>

    <div id="resModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="successMessage">REZERWACJA ZAPISANA, SPRAWDŹ e-mail!</div>
            <div id="formContainer">
                <h2 id="modalTitle" style="color:#fff; margin-top:0;">Rezerwacja</h2>
                <form id="resForm">
                    <input type="hidden" id="gameTitle">
                    <input type="text" id="custName" placeholder="Imię i Nazwisko" required>
                    <input type="tel" id="custPhone" placeholder="Numer telefonu" required>
                    <input type="email" id="custEmail" placeholder="Adres e-mail" required>
                    <button type="submit" id="submitBtn" class="btn">POTWIERDZAM REZERWACJĘ</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const URL = 'https://script.google.com/macros/s/AKfycbwsJjTVyPk8yxmEDVYsnlrbRRD6LXddvt_eoAig5e-x3BwsswPFcFzbCRy58Jr1uUNa_A/exec';

        async function loadData() {
            try {
                const res = await fetch(URL);
                const data = await res.json();
                
                if (data.settings && data.settings.TloStronyURL) {
                    document.body.style.backgroundImage = `url('${data.settings.TloStronyURL}')`;
                }

                document.getElementById('loader').style.display = 'none';
                const grid = document.getElementById('games-grid');
                grid.innerHTML = '';

                data.games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    
                    let isAvailable = (game.Dostepne > 0);
                    let buttonHtml = isAvailable 
                        ? `<button class="btn" onclick="openModal('${game.Tytul} (${game.Platforma})')">Zabawię się w sapera i zamowię</button>`
                        : `<button class="btn" disabled>WYPRZEDANE</button>`;

                    let dataTekst = "Wkrótce";
                    let countdownTekst = "";
                    
                    if (game.DataPremiery) {
                        const dPremiera = new Date(game.DataPremiery);
                        dataTekst = dPremiera.toLocaleDateString('pl-PL');
                        const teraz = new Date();
                        const diff = Math.ceil((dPremiera - teraz) / (1000 * 60 * 60 * 24));
                        
                        if (diff > 0) countdownTekst = `Zostało: <span style="color:var(--primary)">${diff} dni</span>`;
                        else if (diff === 0) countdownTekst = "Premiera DZISIAJ!";
                        else countdownTekst = "Już w sprzedaży!";
                    }

                    card.innerHTML = `
                        <img src="${game.OkladkaURL}" class="card-img" onerror="this.src='https://via.placeholder.com/300x450?text=Brak+Okładki'">
                        <div class="card-body">
                            <span class="platform">${game.Platforma || 'GRA'}</span>
                            <div class="title">${game.Tytul}</div>
                            <div class="date-info">Premiera: ${dataTekst}</div>
                            <div class="countdown">${countdownTekst}</div>
                            <div class="price">${game.Cena} zł</div>
                            ${buttonHtml}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                document.getElementById('loader').innerText = "Błąd połączenia.";
            }
        }

        function openModal(t) { 
            document.getElementById('modalTitle').innerText = t; 
            document.getElementById('gameTitle').value = t; 
            document.getElementById('resModal').style.display = 'block'; 
        }
        
        function closeModal() { 
            document.getElementById('resModal').style.display = 'none'; 
            document.getElementById('successMessage').style.display = 'none'; 
            document.getElementById('formContainer').style.display = 'block'; 
        }

        document.getElementById('resForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "WYSYŁANIE...";

            const p = new URLSearchParams({
                tytul: document.getElementById('gameTitle').value,
                imie: document.getElementById('custName').value,
                telefon: document.getElementById('custPhone').value,
                email: document.getElementById('custEmail').value
            });

            try {
                await fetch(URL + '?' + p.toString(), { mode: 'no-cors' });
                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                setTimeout(closeModal, 3000);
            } catch (err) {
                alert('Błąd wysyłki.');
                btn.disabled = false;
            }
        };

        loadData();
    </script>
</body>
</html>
