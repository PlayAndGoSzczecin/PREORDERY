<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLAY&GO PREORDER</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00aaff; --bg: #0d1117; --card: #161b22; --text: #e0e0e0; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        nav { text-align: center; padding: 20px 0; font-size: 1.8rem; font-weight: 800; color: #fff; text-shadow: 0 0 10px var(--primary); }
        .header-section { text-align: center; background: rgba(0,0,0,0.6); padding: 30px; border-radius: 20px; margin-bottom: 40px; border: 1px solid #333; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .game-card { background: var(--card); border-radius: 15px; overflow: hidden; position: relative; height: 450px; border: 1px solid #333; transition: 0.3s; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); position: absolute; }
        .card-body { position: relative; z-index: 1; padding: 20px; height: 100%; display: flex; flex-direction: column; box-sizing: border-box; }
        .platform { background: var(--primary); color: #fff; padding: 3px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: 700; align-self: flex-start; }
        .title { font-size: 1.5rem; font-weight: 800; color: #fff; margin: 10px 0; }
        .price { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-top: auto; }
        .btn { background: #ff4444; color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; }
        
        /* Modal */
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: var(--card); margin: 10% auto; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid var(--primary); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; }
        .close { float: right; color: #fff; font-size: 28px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <nav>PLAY&GO</nav>
        <div class="header-section">
            <h1 style="margin:0">ZAREZERWUJ SWOJĄ GRĘ</h1>
            <p>Najlepsze premiery w jednym miejscu</p>
        </div>
        <div id="loader" style="text-align:center">Ładowanie ofert...</div>
        <div id="games-grid" class="games-grid"></div>
    </div>

    <div id="resModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color:#fff; margin-top:0">Rezerwacja</h2>
            <form id="resForm">
                <input type="hidden" id="gameTitle">
                <input type="text" id="custName" placeholder="Imię i Nazwisko" required>
                <input type="tel" id="custPhone" placeholder="Numer telefonu" required>
                <input type="email" id="custEmail" placeholder="Adres E-mail" required>
                <button type="submit" id="submitBtn" class="btn">POTWIERDZAM REZERWACJĘ</button>
            </form>
        </div>
    </div>

    <script>
        const URL = 'https://script.google.com/macros/s/AKfycbwABIpsJVPVKHBHIjeGC3iBMoggxaSSGYnazglNdIxuAE4-JQErYANWxoa6ylvvZo3caA/exec';

        async function loadData() {
            try {
                const res = await fetch(URL);
                const data = await res.json();
                document.getElementById('loader').style.display = 'none';
                const grid = document.getElementById('games-grid');
                
                data.games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        <img src="${game.OkladkaURL}" class="card-img">
                        <div class="card-body">
                            <span class="platform">${game.Platforma}</span>
                            <div class="title">${game.Tytul}</div>
                            <div class="price">${game.Cena} zł</div>
                            <button class="btn" onclick="openModal('${game.Tytul} (${game.Platforma})')">REZERWUJĘ</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) { document.getElementById('loader').innerText = "Błąd ładowania."; }
        }

        function openModal(t) {
            document.getElementById('modalTitle').innerText = t;
            document.getElementById('gameTitle').value = t;
            document.getElementById('resModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('resModal').style.display = 'none'; }

        document.getElementById('resForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "WYSYŁANIE...";

            // Budujemy link z danymi
            const p = new URLSearchParams({
                tytul: document.getElementById('gameTitle').value,
                imie: document.getElementById('custName').value,
                telefon: document.getElementById('custPhone').value,
                email: document.getElementById('custEmail').value
            });

            try {
                // Kluczowy moment: wysyłamy dane przez link
                await fetch(URL + '?' + p.toString(), { mode: 'no-cors' });
                alert('REZERWACJA ZAPISANA! Dziękujemy.');
                closeModal();
                document.getElementById('resForm').reset();
            } catch (err) {
                alert('Błąd zapisu. Spróbuj ponownie.');
            } finally {
                btn.disabled = false;
                btn.innerText = "POTWIERDZAM REZERWACJĘ";
            }
        };

        loadData();
    </script>
</body>
</html>
