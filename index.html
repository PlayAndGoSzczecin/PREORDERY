<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLAY&GO PREORDER</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00aaff; --bg: #0d1117; --card: #161b22; --text: #e0e0e0; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; background-repeat: no-repeat; background-position: center center; background-attachment: fixed; background-size: cover; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: -1; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        nav { text-align: center; padding: 20px 0; font-size: 2rem; font-weight: 800; color: #fff; text-shadow: 0 0 10px var(--primary); letter-spacing: 2px; }
        .header-section { text-align: center; background: rgba(0,0,0,0.7); padding: 30px 15px; border-radius: 20px; margin: 20px auto 40px; max-width: 800px; border: 1px solid #333; backdrop-filter: blur(10px); }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .game-card { background: var(--card); border-radius: 18px; overflow: hidden; position: relative; height: 480px; border: 1px solid #333; transition: 0.4s; }
        .card-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); position: absolute; }
        .card-body { position: relative; z-index: 1; padding: 25px; height: 100%; display: flex; flex-direction: column; box-sizing: border-box; background: linear-gradient(to top, rgba(0,0,0,0.9) 30%, transparent 100%); }
        .platform { background: var(--primary); color: #fff; padding: 4px 12px; border-radius: 5px; font-size: 0.7rem; font-weight: 800; align-self: flex-start; }
        .title { font-size: 1.8rem; font-weight: 800; color: #fff; margin: 15px 0 5px; }
        .price { font-size: 2rem; font-weight: 800; color: var(--primary); margin-top: auto; }
        .btn { background: #ff4444; color: #fff; border: none; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; }
        
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); margin: 10% auto; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid var(--primary); position: relative; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; font-family: inherit; }
        #successMessage { display: none; background: #28a745; color: white; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <nav>PLAY&GO</nav>
        <div class="header-section"><h1>Nadchodzące premiery.</h1></div>
        <div id="loader" style="text-align:center">Wczytywanie...</div>
        <div id="games-grid" class="games-grid"></div>
    </div>

    <div id="resModal" class="modal">
        <div class="modal-content">
            <div id="successMessage">REZERWACJA ZAPISANA! Sprawdź e-mail.</div>
            <span style="position:absolute; right:20px; top:15px; color:#fff; font-size:30px; cursor:pointer;" onclick="closeModal()">&times;</span>
            <div id="formContainer">
                <h2 id="modalTitle" style="color:#fff; margin-bottom:20px;">Rezerwacja</h2>
                <form id="resForm">
                    <input type="hidden" id="gameTitle">
                    <input type="text" id="custName" placeholder="Imię i Nazwisko" required>
                    <input type="tel" id="custPhone" placeholder="Numer telefonu" required>
                    <input type="email" id="custEmail" placeholder="Adres E-mail" required>
                    <button type="submit" id="submitBtn" class="btn">POTWIERDZAM REZERWACJĘ</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const URL = 'https://script.google.com/macros/s/AKfycbwABIpsJVPVKHBHIjeGC3iBMoggxaSSGYnazglNdIxuAE4-JQErYANWxoa6ylvvZo3caA/exec';

        async function loadData() {
            try {
                const res = await fetch(URL);
                const data = await res.json();
                if (data.settings?.TloStronyURL) document.body.style.backgroundImage = `url('${data.settings.TloStronyURL}')`;
                document.getElementById('loader').style.display = 'none';
                const grid = document.getElementById('games-grid');
                data.games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    
                    // Logika przycisku
                    let buttonHtml = `<button class="btn" onclick="openModal('${game.Tytul} (${game.Platforma})')">BIORE</button>`;
                    if (game.Dostepne <= 0) {
                        buttonHtml = `<button class="btn" style="background:#555; cursor:not-allowed;" disabled>WYPRZEDANE</button>`;
                    }

                    card.innerHTML = `
                        <img src="${game.OkladkaURL}" class="card-img">
                        <div class="card-body">
                            <span class="platform">${game.Platforma}</span>
                            <div class="title">${game.Tytul}</div>
                            <div style="font-size:0.8rem; color:#aaa; margin-bottom:10px;">
                                ${game.Dostepne > 0 && game.Dostepne < 10 ? 'Zostało tylko: ' + game.Dostepne + ' szt.!' : ''}
                            </div>
                            <div class="price">${game.Cena} zł</div>
                            ${buttonHtml}
                        </div>
                    `;
                    grid.appendChild(card);
                });

        function openModal(t) { 
            document.getElementById('modalTitle').innerText = t; 
            document.getElementById('gameTitle').value = t; 
            document.getElementById('resModal').style.display = 'block'; 
        }
        
        function closeModal() { 
            document.getElementById('resModal').style.display = 'none'; 
            document.getElementById('successMessage').style.display = 'none'; 
            document.getElementById('formContainer').style.display = 'block'; 
        }

        document.getElementById('resForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "WYSYŁANIE...";

            const p = new URLSearchParams({
                tytul: document.getElementById('gameTitle').value,
                imie: document.getElementById('custName').value,
                telefon: document.getElementById('custPhone').value,
                email: document.getElementById('custEmail').value
            });

            try {
                await fetch(URL + '?' + p.toString(), { mode: 'no-cors' });
                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                setTimeout(closeModal, 3500);
                document.getElementById('resForm').reset();
            } catch (err) {
                alert('Błąd połączenia.');
                btn.disabled = false; btn.innerText = "POTWIERDZAM REZERWACJĘ";
            }
        };
        loadData();
    </script>
</body>
</html>
