<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PREORDER - PLAY&GO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00aaff;
            --background-color: #0d1117;
            --card-background: #161b22;
            --text-color: #e0e0e0;
            --header-color: #ffffff;
            --border-color: #30363d;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            background-color: var(--background-color); 
            color: var(--text-color); 
            background-repeat: no-repeat;
            background-position: center center; 
            background-attachment: fixed; 
            background-size: cover; 
            min-height: 100vh;
            overflow-x: hidden; /* Blokada bocznego przesuwania */
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); 
            z-index: -1;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 15px; position: relative; z-index: 1; box-sizing: border-box; }
        
        nav { display: flex; justify-content: center; padding: 1.5rem 0; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--header-color); text-shadow: 0 0 10px var(--primary-color); letter-spacing: 2px; }

        /* FIX NAGŁÓWKA */
        .header-section {
            text-align: center;
            padding: 2rem 1rem;
            margin: 2rem auto;
            max-width: 95%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
        }

        .main-headline {
            font-size: clamp(1.4rem, 6vw, 3rem); /* Zmniejszony dolny limit */
            font-weight: 800;
            color: var(--header-color);
            margin: 0;
            text-transform: uppercase;
            line-height: 1.2;
            word-wrap: break-word;
        }

        .sub-headline { font-size: 0.9rem; margin-top: 10px; opacity: 0.9; line-height: 1.4; }
        
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding-bottom: 4rem; }

        .game-card {
            position: relative; height: 450px; border-radius: 15px; overflow: hidden;
            display: flex; flex-direction: column; background: var(--card-background);
            border: 1px solid var(--border-color); transition: 0.3s;
        }

        .card-bg-image { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); z-index: 0; }
        .card-content { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; padding: 1.2rem; background: linear-gradient(to top, rgba(0,0,0,0.9) 30%, transparent 100%); }
        .card-platform { font-size: 0.7rem; font-weight: 800; color: white; background: var(--primary-color); padding: 3px 10px; border-radius: 5px; align-self: flex-start; margin-bottom: 10px; }
        .card-title { font-size: 1.7rem; font-weight: 800; color: white; margin: 0; line-height: 1.1; }
        .card-price { font-size: 1.8rem; font-weight: 800; color: var(--primary-color); }
        .card-button { background: #ff4444; border: none; color: white; padding: 10px 15px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 0.7rem; }

        /* FIX MODALA NA TELEFON */
        .modal { 
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            overflow-y: auto; /* Kluczowe: pozwala przewijać formularz na małym ekranie */
        }

        .modal-content { 
            background: var(--card-background); 
            margin: 10% auto; 
            padding: 20px; 
            border-radius: 15px; 
            width: 90%; 
            max-width: 400px; 
            border: 1px solid var(--primary-color);
            position: relative;
        }

        .close-btn { position: absolute; right: 15px; top: 10px; font-size: 2rem; color: #aaa; cursor: pointer; }
        
        #reservation-form label { display: block; margin-bottom: 5px; font-size: 0.8rem; color: #bbb; }
        #reservation-form input { 
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; 
            border: 1px solid #333; background: #222; color: white; box-sizing: border-box; 
        }

        #submit-reservation { 
            width: 100%; padding: 15px; background: var(--primary-color); 
            border: none; color: white; font-weight: 800; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav><div class="logo">PLAY&GO</div></nav>
        <section class="header-section">
            <h1 class="main-headline">Nadchodzące premiery.</h1>
            <p class="sub-headline">Zarezerwuj kopię dla siebie, póki jest dostępna.</p>
        </section>
        <div id="loader" style="text-align:center; padding: 20px;">Ładowanie ofert...</div>
        <div id="games-grid" class="games-grid"></div>
    </div>

    <div id="reservation-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="modal-title" style="font-size: 1.2rem; margin-bottom: 20px;">Rezerwacja</h2>
            <form id="reservation-form">
                <input type="hidden" id="game-title-input">
                <label>Imię i Nazwisko:</label>
                <input type="text" id="customer-name" required>
                <label>Numer telefonu:</label>
                <input type="tel" id="customer-phone" required>
                <label>E-mail:</label>
                <input type="email" id="customer-email" required>
                <button type="submit" id="submit-reservation">ZAMAWIAM</button>
            </form>
        </div>
    </div>

    <script>
        const WEB_APP_URL = 'TWOJ_LINK_DO_SKRYPTU'; // <--- UPEWNIJ SIĘ, ŻE TU JEST LINK

        async function fetchSiteData() {
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                document.getElementById('loader').style.display = 'none';
                
                data.games.forEach(game => {
                    const gameId = (game.Tytul + (game.Platforma || '')).replace(/[^a-zA-Z0-9]/g, '-');
                    const div = document.createElement('div');
                    div.className = 'game-card';
                    div.innerHTML = `
                        <img src="${game.OkladkaURL}" class="card-bg-image">
                        <div class="card-content">
                            <div class="card-platform">${game.Platforma}</div>
                            <h3 class="card-title">${game.Tytul}</h3>
                            <div style="flex-grow:1"></div>
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <div class="card-price">${game.Cena} zł</div>
                                <button class="card-button" onclick="openModal('${game.Tytul}')">BIORE</button>
                            </div>
                        </div>
                    `;
                    document.getElementById('games-grid').appendChild(div);
                });
            } catch (e) { console.error(e); }
        }

        function openModal(title) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('game-title-input').value = title;
            document.getElementById('reservation-modal').style.display = 'block';
            document.body.style.overflow = 'hidden'; // Blokada przewijania tła
        }

        document.querySelector('.close-btn').onclick = () => {
            document.getElementById('reservation-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        };

        document.getElementById('reservation-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-reservation');
            btn.disabled = true;
            btn.innerText = "WYSYŁANIE...";

            const formData = new URLSearchParams();
            formData.append('tytul', document.getElementById('game-title-input').value);
            formData.append('imie', document.getElementById('customer-name').value);
            formData.append('telefon', document.getElementById('customer-phone').value);
            formData.append('email', document.getElementById('customer-email').value);

            try {
                await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: formData });
                alert('Dziękujemy! Rezerwacja została zapisana.');
                document.getElementById('reservation-modal').style.display = 'none';
                document.body.style.overflow = 'auto';
                document.getElementById('reservation-form').reset();
            } catch (err) {
                alert('Błąd wysyłania. Spróbuj ponownie.');
            } finally {
                btn.disabled = false;
                btn.innerText = "ZAMAWIAM";
            }
        };

        fetchSiteData();
    </script>
</body>
</html>
