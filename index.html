<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLAY&GO PREORDERY</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/wBH0Gjsw/Projekt-bez-nazwy-11.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00aaff; --bg: #0d1117; --card: #161b22; --text: #e0e0e0; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); color: var(--text); min-height: 100vh; background-size: cover; background-attachment: fixed; background-position: center; position: relative; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.65); z-index: -1; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        nav { text-align: center; padding: 20px 0; font-size: 2.8rem; font-weight: 800; color: #fff; text-shadow: 0 0 20px var(--primary); letter-spacing: 4px; }
        .header-section { text-align: center; background: rgba(0,0,0,0.75); padding: 35px 20px; border-radius: 25px; margin: 20px auto 50px; max-width: 850px; border: 1px solid #444; backdrop-filter: blur(12px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header-section h1 { margin: 0; font-size: 2.4rem; color: #fff; }
        .subtitle { margin-top: 12px; font-size: 1.1rem; color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        
        .game-card { background: var(--card); border-radius: 22px; overflow: hidden; position: relative; height: 560px; border: 1px solid #333; transition: 0.3s; }
        .game-card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .card-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.9); position: absolute; transition: 0.5s; }
        .card-body { position: relative; z-index: 1; padding: 30px; height: 100%; display: flex; flex-direction: column; box-sizing: border-box; background: linear-gradient(to top, rgba(0,0,0,0.95) 55%, transparent 100%); }
        .title { font-size: 1.8rem; font-weight: 800; color: #fff; line-height: 1.1; margin-bottom: 8px; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 2px 2px 5px rgba(0,0,0,0.9); }
        
        .card-description { 
            font-size: 1.6rem; 
            color: #fff; 
            margin: auto 0; 
            text-align: center; 
            line-height: 1.2; 
            font-weight: 800;
            text-transform: uppercase;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 1px 1px 3px #000;
            display: -webkit-box; 
            -webkit-line-clamp: 3; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
        }

        .price { font-size: 2.4rem; font-weight: 800; color: var(--primary); margin-top: auto; margin-bottom: 18px; }
        .btn { background: #ff4444; color: #fff; border: none; padding: 18px; border-radius: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.2s; }
        
        .featured-banner { grid-column: 1 / -1; height: 320px; background-size: cover; background-position: center; border-radius: 22px; position: relative; overflow: hidden; border: 2px solid #ff0000; margin-top: 20px; display: flex; align-items: center; }
        .banner-overlay { background: linear-gradient(to top, rgba(0,0,0,0.9) 10%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.8) 100%); width: 100%; height: 100%; padding: 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; box-sizing: border-box; }
        .featured-banner .title { font-size: 3.5rem !important; width: 100%; margin: 5px 0; text-transform: uppercase; color: #fff; text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 2px 2px 5px #000; letter-spacing: 2px; line-height: 1; }
        .banner-price { font-size: 3.2rem; font-weight: 800; color: var(--primary); text-shadow: 0 0 15px rgba(0,170,255,0.4); }

        /* Styl paska postępu */
        .progress-container { width: 100%; background-color: #333; border-radius: 10px; margin: 10px 0; height: 8px; position: relative; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #ff4444, #ff0000); width: 0%; transition: width 0.5s ease-in-out; }
        .progress-text { font-size: 0.75rem; color: #bbb; margin-bottom: 5px; font-weight: 600; text-align: left; }

        @media (max-width: 768px) {
            .featured-banner { height: auto; min-height: 350px; }
            .featured-banner .title { font-size: 2.2rem !important; }
            .card-description { font-size: 1.2rem; }
        }

        footer { text-align: center; padding: 40px 20px; color: #666; font-size: 0.85rem; letter-spacing: 1px; }
        #visitor-count { color: var(--primary); font-weight: bold; font-size: 1rem; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .modal-content { background: var(--card); margin: 10vh auto; padding: 40px; border-radius: 30px; width: 90%; max-width: 440px; border: 1px solid var(--primary); position: relative; }
        input { width: 100%; padding: 16px; margin: 10px 0; border-radius: 14px; border: 1px solid #333; background: #1a1f26; color: #fff; font-family: 'Poppins'; }
        #successMessage { display: none; background: #28a745; color: white; padding: 25px; border-radius: 20px; text-align: center; font-weight: 800; }
        .close-btn { position: absolute; right: 25px; top: 20px; color: #fff; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <nav>PLAY&GO</nav>
        <div class="header-section">
            <h1>Nadchodzące premiery.</h1>
            <p class="subtitle">Kliknij i zamów, zanim ktoś Cię ubiegnie!</p>
        </div>
        <div id="loader" style="text-align:center;">Ładowanie ofert...</div>
        <div id="games-grid" class="games-grid"></div>
    </div>

    <div id="resModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="successMessage">REZERWACJA ZAPISANA!<br><small>Sprawdź maila.</small></div>
            <div id="formContainer">
                <h2 id="modalTitle" style="color:#fff; margin-top:0;">Rezerwacja</h2>
                <form id="resForm">
                    <input type="hidden" id="gameTitle">
                    <input type="text" id="custName" placeholder="Imię i Nazwisko" required>
                    <input type="tel" id="custPhone" placeholder="Numer telefonu" required>
                    <input type="email" id="custEmail" placeholder="Adres e-mail" required>
                    <div style="display:none;"><input type="text" id="robotCheck"></div>
                    <p id="captchaQuestion" style="font-size:0.8rem; color:var(--primary); margin:15px 0 5px; font-weight:700;"></p>
                    <input type="number" id="humanVerify" placeholder="Twój wynik" required>
                    <div style="margin: 15px 0; font-size: 0.8rem; color: #bbb; display: flex; align-items: flex-start; gap: 10px; text-align: left;">
                        <input type="checkbox" id="privacyCheck" style="width: 18px; height: 18px; margin-top: 2px; cursor: pointer;" required>
                        <label for="privacyCheck" style="cursor: pointer; line-height: 1.4;">
                            Zapoznałem się z <a href="https://playandgo.pl/polityka-prywatnosci" target="_blank" style="color: var(--primary); text-decoration: none; font-weight: 600;">Polityką Prywatności</a> i wyrażam zgodę na przetwarzanie danych.
                        </label>
                    </div>
                    <button type="submit" id="submitBtn" class="btn">POTWIERDZAM REZERWACJĘ</button>
                </form>
            </div>
        </div>
    </div>

    <footer>
        Dziękujemy za odwiedziny! Jesteś naszym <span id="visitor-count">...</span> gościem.
    </footer>

    <script>
        const URL = 'https://script.google.com/macros/s/AKfycbw1r68KDSbcKhTtqihCdc0qIbZX4Wh46Eo9ZGg9K3i1LdH9sKUAp47xH59HswRnfSTZpA/exec';
        
        let correctCaptchaAnswer = 0;
        let modalOpenTime = 0;

        async function loadData() {
            try {
                const res = await fetch(URL);
                const data = await res.json();
                
                if (data.settings) {
                    if (data.settings.TloStronyURL) document.body.style.backgroundImage = `url('${data.settings.TloStronyURL}')`;
                    if (data.settings.Licznik) document.getElementById('visitor-count').innerText = data.settings.Licznik;
                }

                document.getElementById('loader').style.display = 'none';
                const grid = document.getElementById('games-grid');
                grid.innerHTML = '';

                for (let i = 0; i < data.games.length; i++) {
                    const game = data.games[i];
                    const opisGry = game.Opis || "";
                    
                    let dataTekst = "Wkrótce";
                    let countdownTekst = "";
                    if (game.DataPremiery) {
                        const dPremiera = new Date(game.DataPremiery);
                        dataTekst = dPremiera.toLocaleDateString('pl-PL');
                        const teraz = new Date();
                        const diff = Math.ceil((dPremiera - teraz) / (1000 * 60 * 60 * 24));
                        if (diff > 0) countdownTekst = `Zostało: <span style="color:var(--primary)">${diff} dni</span>`;
                        else if (diff === 0) countdownTekst = "Premiera DZISIAJ!";
                        else countdownTekst = "Dostępna w ofercie!";
                    }

                    // Obliczanie procentu dla paska postępu
                    // Używamy game.Dostepne (to co zostało) i domyślnej puli (np. game.Limit lub suma)
                    let zajete = game.Zajete || 0; 
                    let limit = game.Dostepne + zajete;
                    let procent = limit > 0 ? Math.round((zajete / limit) * 100) : 0;

                    if (i === data.games.length - 1) {
                        const banner = document.createElement('div');
                        banner.className = 'featured-banner';
                        banner.style.backgroundImage = `url('${game.OkladkaURL}')`;
                        banner.innerHTML = `
                            <div class="banner-overlay">
                                <span style="background:#ff0000; color:#fff; padding:5px 15px; border-radius:5px; font-size:0.9rem; font-weight:800; align-self:center; margin-bottom:15px; box-shadow: 0 0 10px rgba(255,0,0,0.5);">
                                    ${game.Platforma} - POLECANE
                                </span>
                                <div class="title">${game.Tytul}</div>
                                <div style="font-size: 1.4rem; color: #fff; margin: 10px auto 15px; font-weight: 400; max-width: 90%; line-height: 1.4; text-shadow: 1px 1px 5px #000;">
                                    ${opisGry}
                                </div>
                                <div style="font-size:1.1rem; opacity:0.9; margin-bottom: 10px; text-shadow: 1px 1px 3px #000;">
                                    📅 Premiera: <strong>${dataTekst}</strong> | ⏳ ${countdownTekst}
                                </div>
                                <div class="banner-price">${game.Cena} zł</div>
                            </div>
                        `;
                        grid.appendChild(banner);
                    } 
                    else {
                        const card = document.createElement('div');
                        card.className = 'game-card';
                        let isAvailable = (game.Dostepne > 0);
                        let buttonHtml = isAvailable 
                            ? `<button class="btn" onclick="openModal('${game.Tytul} (${game.Platforma})')">Zabawię się w sapera i zamówię</button>`
                            : `<button class="btn" style="background:#555;" disabled>WYPRZEDANE</button>`;

                        card.innerHTML = `
                            <img src="${game.OkladkaURL}" class="card-img" onerror="this.src='https://via.placeholder.com/400x600'">
                            <div class="card-body">
                                <span style="background:var(--primary); color:#fff; padding:5px 10px; border-radius:5px; font-size:0.7rem; font-weight:800; align-self:flex-start; margin-bottom:10px;">${game.Platforma}</span>
                                <div class="title">${game.Tytul}</div>
                                <div class="card-description">${opisGry}</div>
                                <div style="font-size:0.85rem; opacity:0.8;">Premiera: ${dataTekst}</div>
                                <div style="font-size:0.9rem; font-weight:700; margin-bottom:5px;">${countdownTekst}</div>
                                <div class="price">${game.Cena} zł</div>
                                
                                <div style="width: 100%; margin: 10px 0;">
                                    <div class="progress-text">Zarezerwowano już ${procent}% nakładu</div>
                                    <div class="progress-container">
                                        <div class="progress-bar" style="width: ${procent}%"></div>
                                    </div>
                                </div>

                                ${buttonHtml}
                            </div>
                        `;
                        grid.appendChild(card);
                    }
                }
            } catch (e) { document.getElementById('loader').innerText = "Błąd połączenia z bazą."; }
        }

        function openModal(t) {
            const n1 = Math.floor(Math.random() * 15) + 5;
            const n2 = Math.floor(Math.random() * 10) + 2;
            correctCaptchaAnswer = n1 + n2;
            document.getElementById('captchaQuestion').innerText = `ANTY-BOT: Ile to jest ${n1} + ${n2}?`;
            document.getElementById('modalTitle').innerText = t;
            document.getElementById('gameTitle').value = t;
            document.getElementById('resModal').style.display = 'block';
            modalOpenTime = Date.now();
        }

        function closeModal() { document.getElementById('resModal').style.display = 'none'; }

        document.getElementById('resForm').onsubmit = async (e) => {
            e.preventDefault();
            const timeSpent = (Date.now() - modalOpenTime) / 1000;
            if (timeSpent < 4) return;
            const email = document.getElementById('custEmail').value.toLowerCase();
            if (email.includes('.gov') || email.includes('.mil')) { alert("Niedozwolony adres."); return; }
            if (!document.getElementById('privacyCheck').checked) { alert("Zaakceptuj politykę prywatności."); return; }
            if (parseInt(document.getElementById('humanVerify').value) !== correctCaptchaAnswer) { alert("Błędny wynik!"); return; }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "PRZETWARZANIE...";
            const p = new URLSearchParams({
                tytul: document.getElementById('gameTitle').value,
                imie: document.getElementById('custName').value,
                telefon: document.getElementById('custPhone').value,
                email: document.getElementById('custEmail').value
            });

            try {
                await fetch(URL + '?' + p.toString(), { mode: 'no-cors' });
                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                setTimeout(() => { closeModal(); location.reload(); }, 3000);
            } catch (err) { alert('Błąd połączenia.'); btn.disabled = false; }
        };

        loadData();
    </script>
</body>
</html>
