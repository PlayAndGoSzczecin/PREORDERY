<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLAY&GO PREORDERY</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/wBH0Gjsw/Projekt-bez-nazwy-11.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00aaff; --bg: #0d1117; --card: #161b22; --text: #e0e0e0; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); color: var(--text); min-height: 100vh; background-size: cover; background-attachment: fixed; background-position: center; position: relative; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.65); z-index: -1; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        nav { text-align: center; padding: 20px 0; font-size: 2.8rem; font-weight: 800; color: #fff; text-shadow: 0 0 20px var(--primary); letter-spacing: 4px; }
        
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        
        /* --- STYL DLA KAŻDEJ KARTY --- */
        .game-card { 
            background: var(--card); 
            border-radius: 22px; 
            overflow: hidden; 
            position: relative; 
            height: 600px; /* Zwiększona wysokość */
            border: 1px solid #333; 
            transition: 0.3s; 
            display: flex;
            align-items: center;
        }
        .game-card:hover { transform: translateY(-8px); border-color: #ff0000; box-shadow: 0 0 20px rgba(255,0,0,0.2); }
        
        .card-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); position: absolute; transition: 0.5s; }
        .game-card:hover .card-img { filter: brightness(0.3); transform: scale(1.05); }

        .card-body { 
            position: relative; 
            z-index: 1; 
            padding: 25px; 
            height: 100%; 
            width: 100%;
            display: flex; 
            flex-direction: column; 
            justify-content: center; /* Centrowanie pionowe */
            align-items: center;    /* Centrowanie poziome */
            text-align: center;
            box-sizing: border-box; 
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
        }

        .platform-tag { background: var(--primary); color: #fff; padding: 4px 12px; border-radius: 5px; font-size: 0.75rem; font-weight: 800; margin-bottom: 10px; }
        .title-small { font-size: 1.2rem; font-weight: 600; color: #fff; opacity: 0.8; margin-bottom: 5px; text-transform: uppercase; }

        /* WIELKI CZERWONY NAPIS (OPIS) */
        .big-neon-text { 
            font-size: 2.2rem; 
            font-weight: 800; 
            color: #fff; 
            text-transform: uppercase; 
            line-height: 1.1;
            margin: 15px 0;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 2px 2px 5px #000;
            letter-spacing: 1px;
        }

        .info-row { font-size: 0.85rem; opacity: 0.8; margin-bottom: 5px; }
        .price { font-size: 2.2rem; font-weight: 800; color: var(--primary); margin-bottom: 15px; }
        .btn { background: #ff4444; color: #fff; border: none; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.2s; }

        /* BANER (SPECJALNY) */
        .featured-banner { grid-column: 1 / -1; height: 450px; border: 2px solid #ff0000; box-shadow: 0 0 30px rgba(255,0,0,0.3); }
        .featured-banner .big-neon-text { font-size: 3.5rem; }

        @media (max-width: 768px) {
            .game-card { height: 500px; }
            .big-neon-text { font-size: 1.6rem; }
            .featured-banner .big-neon-text { font-size: 2.2rem; }
        }

        /* Modal & Footer bez zmian */
        footer { text-align: center; padding: 40px 20px; color: #666; font-size: 0.85rem; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .modal-content { background: var(--card); margin: 10vh auto; padding: 40px; border-radius: 30px; width: 90%; max-width: 440px; border: 1px solid var(--primary); position: relative; }
        input { width: 100%; padding: 16px; margin: 10px 0; border-radius: 14px; border: 1px solid #333; background: #1a1f26; color: #fff; }
        .btn-modal { background: #ff4444; color: #fff; border: none; padding: 18px; border-radius: 16px; font-weight: 800; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <nav>PLAY&GO</nav>
        <div id="loader" style="text-align:center;">Ładowanie ofert...</div>
        <div id="games-grid" class="games-grid"></div>
    </div>

    <div id="resModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; right:25px; top:20px; color:#fff; font-size:40px; cursor:pointer;" onclick="closeModal()">&times;</span>
            <div id="successMessage" style="display:none; background:#28a745; color:white; padding:25px; border-radius:20px; text-align:center; font-weight:800;">REZERWACJA ZAPISANA!</div>
            <div id="formContainer">
                <h2 id="modalTitle" style="color:#fff; margin-top:0;">Rezerwacja</h2>
                <form id="resForm">
                    <input type="hidden" id="gameTitle">
                    <input type="text" id="custName" placeholder="Imię i Nazwisko" required>
                    <input type="tel" id="custPhone" placeholder="Numer telefonu" required>
                    <input type="email" id="custEmail" placeholder="Adres e-mail" required>
                    <p id="captchaQuestion" style="font-size:0.8rem; color:var(--primary); margin:15px 0 5px; font-weight:700;"></p>
                    <input type="number" id="humanVerify" placeholder="Twój wynik" required>
                    <button type="submit" id="submitBtn" class="btn-modal">POTWIERDZAM REZERWACJĘ</button>
                </form>
            </div>
        </div>
    </div>

    <footer>Dziękujemy za odwiedziny! Gość nr: <span id="visitor-count">...</span></footer>

    <script>
        const URL = 'https://script.google.com/macros/s/AKfycbxrzJdFnt7A43ioVnvHthQ6qWxRqjvyLBo4pEb-4ctrFgueiPHtEZR7ivNZTGh8denU/exec';
        let correctCaptchaAnswer = 0;

        async function loadData() {
            try {
                const res = await fetch(URL);
                const data = await res.json();
                if (data.settings.Licznik) document.getElementById('visitor-count').innerText = data.settings.Licznik;

                const grid = document.getElementById('games-grid');
                grid.innerHTML = '';
                document.getElementById('loader').style.display = 'none';

                data.games.forEach((game, i) => {
                    const isLast = (i === data.games.length - 1);
                    const card = document.createElement('div');
                    card.className = isLast ? 'game-card featured-banner' : 'game-card';
                    
                    let dataTekst = "Wkrótce";
                    if (game.DataPremiery) {
                        dataTekst = new Date(game.DataPremiery).toLocaleDateString('pl-PL');
                    }

                    const opis = game.Opis || "ZAMÓW TERAZ";
                    let isAvailable = (game.Dostepne > 0);
                    let buttonHtml = isAvailable 
                        ? `<button class="btn" onclick="openModal('${game.Tytul} (${game.Platforma})')">ZAREZERWUJ</button>`
                        : `<button class="btn" style="background:#555;" disabled>WYPRZEDANE</button>`;

                    card.innerHTML = `
                        <img src="${game.OkladkaURL}" class="card-img">
                        <div class="card-body">
                            <span class="platform-tag">${game.Platforma}</span>
                            <div class="title-small">${game.Tytul}</div>
                            <div class="big-neon-text">${opis}</div>
                            <div class="info-row">Premiera: ${dataTekst}</div>
                            <div class="price">${game.Cena} zł</div>
                            ${buttonHtml}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) { document.getElementById('loader').innerText = "Błąd bazy danych."; }
        }

        function openModal(t) {
            const n1 = Math.floor(Math.random() * 10) + 1;
            const n2 = Math.floor(Math.random() * 10) + 1;
            correctCaptchaAnswer = n1 + n2;
            document.getElementById('captchaQuestion').innerText = `Ile to ${n1} + ${n2}?`;
            document.getElementById('modalTitle').innerText = t;
            document.getElementById('gameTitle').value = t;
            document.getElementById('resModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('resModal').style.display = 'none'; }

        document.getElementById('resForm').onsubmit = async (e) => {
            e.preventDefault();
            if (parseInt(document.getElementById('humanVerify').value) !== correctCaptchaAnswer) { alert("Błąd!"); return; }
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "CZEKAJ...";
            const p = new URLSearchParams({
                tytul: document.getElementById('gameTitle').value,
                imie: document.getElementById('custName').value,
                telefon: document.getElementById('custPhone').value,
                email: document.getElementById('custEmail').value
            });
            await fetch(URL + '?' + p.toString(), { mode: 'no-cors' });
            document.getElementById('formContainer').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
            setTimeout(() => location.reload(), 2000);
        };

        loadData();
    </script>
</body>
</html>
